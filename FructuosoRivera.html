<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUCTUOSO RIVERA - Quiz</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="FructuosoRivera.css">
    <style>
      
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ededed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .contenedor-centrado {
            margin-bottom: 20px;
        }

        .contenedor-centrado img {
            max-width: 1000px;
            border-radius: 12px;
        }

        .contenedor {
            background-color: rgb(30, 1, 193);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(231, 228, 228, 0.986);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .pregunta {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .opciones {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn.correcta {
            background-color: #198754;
            color: white;
        }

        .btn.incorrecta {
            background-color: #dc3545;
            color: white;
        }

        #resultado {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
  <audio controls autoplay loop>
        <source src="LA CASA DE RIVERA Voces Anónimas con Guillermo Lockhart - Voces Anónimas_[cut_498sec].mp3" type="audio/ogg">
        <source src="LA CASA DE RIVERA Voces Anónimas con Guillermo Lockhart - Voces Anónimas_[cut_498sec].mp3" type="audio/mpeg">
    </audio>
    <div class="contenedor-centrado">
        <img src="FructuosoRivera.jpeg" alt="Imagen de Fructuoso Rivera" class="img-fluid">
    </div>

    <div class="contenedor">
        <h1>Quiz Interactivo</h1>

        <div id="contenedor-juego">
            <div id="pregunta" class="pregunta"></div>
            <div id="opciones" class="opciones"></div>
        </div>

        <div id="resultado"></div>
    </div>

    <script>
        const preguntas = [
            {
                pregunta: "¿En qué departamento se encuentra la histórica casa asociada a Fructuoso Rivera mencionada en las leyendas?",
                opciones: ["Durazno", "Maaldonado", "Colonia"],
                respuesta: "Durazno"
            },
            {
                pregunta: "¿Quién fue Fructuoso Rivera?",
                opciones: ["Un escritor uruguayo.", "El primer presidente constitucional de Uruguay.", "Un explorador español."],
                respuesta: "El primer presidente constitucional de Uruguay."
            },
            {
                pregunta: "Según la leyenda de la Casa de Fructuoso Rivera, ¿qué afirman algunas personas haber experimentado en el lugar?",
                opciones:  ["Ruidos extraños y presencias misteriosas.", "Apariciones de animales salvajes.", "Tesoros escondidos en el jardín."],
                respuesta: "Ruidos extraños y presencias misteriosas."
            }
        ];

        let preguntaActual = 0;
        let puntaje = 0;

        const pregunta = document.getElementById("pregunta");
        const opciones = document.getElementById("opciones");
        const resultado = document.getElementById("resultado");

        function cargarPregunta() {
            pregunta.textContent =
                `(${preguntaActual + 1}/${preguntas.length}) ${preguntas[preguntaActual].pregunta}`;

            opciones.innerHTML = "";

            preguntas[preguntaActual].opciones.forEach(opcion => {
                const boton = document.createElement("button");
                boton.textContent = opcion;
                boton.className = "btn btn-outline-primary";

                boton.onclick = () => verificarRespuesta(opcion, boton);

                opciones.appendChild(boton);
            });
        }

        function verificarRespuesta(opcion, boton) {
            const correcta = preguntas[preguntaActual].respuesta;
            const botones = document.querySelectorAll(".opciones button");

            botones.forEach(btn => btn.disabled = true);

            if (opcion === correcta) {
                puntaje++;
                boton.classList.add("correcta");
            } else {
                boton.classList.add("incorrecta");

                botones.forEach(btn => {
                    if (btn.textContent === correcta) {
                        btn.classList.add("correcta");
                    }
                });
            }

            preguntaActual++;

            setTimeout(() => {
                if (preguntaActual < preguntas.length) {
                    cargarPregunta();
                } else {
                    document.getElementById("contenedor-juego").style.display = "none";
                    resultado.textContent =
                        `¡Juego terminado! Obtuviste ${puntaje} de ${preguntas.length} puntos.`;
                }
            }, 1500);
        }

        cargarPregunta();
    </script>

</body>
</html>
